<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Luminary</title>
    <script>
      // GitHub Pages returns this file for any unknown path.
      // Store the intended path and redirect to the app root;
      // index.html restores it via history.replaceState so Expo Router
      // picks up the correct route.
      var base = "/bb-study-app";
      var path = window.location.pathname.slice(base.length) || "/";
      sessionStorage.setItem("gh-pages-redirect", path + window.location.search + window.location.hash);
      window.location.replace(base + "/");
    </script>
  </head>
  <body></body>
</html>
